services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123!' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  api:
    build:
      context: .
      dockerfile: src/NotificationPlatform.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # The catalog DB is the only statically-configured connection string.
      # Each tenant's database connection string is stored in the catalog and resolved at runtime.
      ConnectionStrings__CatalogConnection: "Server=db,1433;Database=NotificationPlatform_Catalog;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
